services:
  matrix-bot-mikrotik:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    container_name: matrix-bot-mikrotik
    hostname: matrix-bot-mikrotik
    restart: unless-stopped
    environment:
      ALLOW_WRITES: ${ALLOW_WRITES:-false}
    healthcheck:
      test: ["CMD", "pgrep", "-f", "bot.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:mode=1777,noexec,nosuid
    volumes:
      - ./bot_data:/home/bot/.local/share/matrix-commander-rs
      - ./config.yaml:/home/bot/config/config.yaml:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add: []
    cpus: 0.5
    mem_limit: 192m
    mem_reservation: 64m
